name: Cleanup STALKER v4 generated outputs

on:
  push:
    branches:
      - agent/stalker-approved-exact-v4
    paths:
      - ".github/workflows/stalker-v4-cleanup.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/stalker-approved-exact-v4
          fetch-depth: 0
          persist-credentials: true

      - name: Remove generated outputs from repository
        shell: bash
        run: |
          rm -rf publish preview
          rm -f .github/workflows/stalker-v4-cleanup.yml

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to clean."
            exit 0
          fi
          git commit -m "Прибрати згенеровані файли збірки з PR"
          git push origin HEAD:agent/stalker-approved-exact-v4
