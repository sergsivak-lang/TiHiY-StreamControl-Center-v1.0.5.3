name: Fix STALKER settings window

on:
  push:
    branches:
      - agent/stalker-approved-exact-v4
    paths:
      - ".github/workflows/fix-stalker-settings-window.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-settings:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stalker-approved-exact-v4
          fetch-depth: 0
          persist-credentials: true

      - name: Remove doubled header and stretch footer
        shell: pwsh
        run: |
          $runtime = "Services/StalkerApprovedTextureRuntime.cs"
          $text = Get-Content $runtime -Raw

          $text = $text.Replace(
          '            ApplyBorders(stalker);`r`n            ApplyControls(stalker);`r`n            ApplyImages(stalker);`r`n            ApplyTexts(stalker);',
          '            ApplyBorders(stalker);`r`n            ApplyControls(stalker);`r`n            ApplyImages(stalker);`r`n            ApplyHeaderVisibility(stalker);`r`n            ApplyTexts(stalker);')

          $anchor = @'
        private void ApplyTexts(bool stalker)
'@
          $method = @'
        private void ApplyHeaderVisibility(bool stalker)
        {
            foreach (var text in StalkerApprovedAssets.FindDescendants<TextBlock>(_window))
            {
                var value = text.Text ?? string.Empty;
                if (value == "TiHiY" ||
                    value.Contains("StreamControl Center", StringComparison.OrdinalIgnoreCase) ||
                    value.Contains("SETTINGS", StringComparison.OrdinalIgnoreCase) ||
                    value.Contains("НАЛАШТУВАННЯ", StringComparison.OrdinalIgnoreCase))
                {
                    if (!_texts.ContainsKey(text))
                        _texts[text] = new TextState(text.Foreground, text.FontFamily, text.FontWeight, text.Opacity);
                    text.Opacity = stalker ? 0 : _texts[text].Opacity;
                }
            }
        }

'@
          if (-not $text.Contains($method.Trim())) {
            $text = $text.Replace($anchor, $method + $anchor)
          }

          $text = $text.Replace(
          'private sealed record TextState(Brush? Foreground, FontFamily FontFamily, FontWeight FontWeight);',
          'private sealed record TextState(Brush? Foreground, FontFamily FontFamily, FontWeight FontWeight, double Opacity);')
          $text = $text.Replace(
          '_texts[text] = new TextState(text.Foreground, text.FontFamily, text.FontWeight);',
          '_texts[text] = new TextState(text.Foreground, text.FontFamily, text.FontWeight, text.Opacity);')
          $text = $text.Replace(
          '                    text.FontWeight = state.FontWeight;',
          '                    text.FontWeight = state.FontWeight;`r`n                    text.Opacity = state.Opacity;')
          Set-Content $runtime $text -Encoding utf8

          $xaml = "Windows/SettingsWindow.xaml"
          $markup = Get-Content $xaml -Raw
          $markup = $markup.Replace(
          '<Border Grid.Row="2" Background="#06172A" BorderBrush="{DynamicResource Line}" BorderThickness="1,1,1,1" CornerRadius="5" Padding="8" Margin="0,8,0,0">',
          '<Border Grid.Row="2" Background="#06172A" BorderBrush="{DynamicResource Line}" BorderThickness="1" CornerRadius="0" Padding="8" Margin="-10,8,-10,-10" HorizontalAlignment="Stretch">')
          Set-Content $xaml $markup -Encoding utf8

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build
        run: |
          dotnet restore TiHiY.StreamControlCenter.sln
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore

      - name: Commit fix
        shell: pwsh
        run: |
          Remove-Item .github/workflows/fix-stalker-settings-window.yml -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Прибрати дублювання та розтягнути панель налаштувань STALKER"
          git push origin HEAD:agent/stalker-approved-exact-v4
