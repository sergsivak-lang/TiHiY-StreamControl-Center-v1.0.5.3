name: Package current test build

on:
  pull_request:
    branches:
      - feature/stalker-theme-and-chat-fixes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore and build
        shell: pwsh
        run: |
          dotnet restore TiHiY.StreamControlCenter.sln
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore

      - name: Publish Windows x64
        shell: pwsh
        run: |
          dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish
          if (-not (Test-Path "publish/TiHiY.StreamControlCenter.exe")) { throw "EXE was not created" }

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path publish/* -DestinationPath TiHiY-StreamControl-Center-STALKER-current-test.zip -Force

      - name: Upload program
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-StreamControl-Center-STALKER-current-test
          path: TiHiY-StreamControl-Center-STALKER-current-test.zip
          if-no-files-found: error
