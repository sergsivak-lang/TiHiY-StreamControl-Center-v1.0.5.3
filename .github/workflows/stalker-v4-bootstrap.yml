name: Import approved STALKER v4 patch

on:
  push:
    branches:
      - agent/stalker-approved-exact-v4
    paths:
      - "TiHiY-Stalker-Approved-Exact-Patch-v4*.zip"
      - ".github/workflows/stalker-v4-bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-approved-v4:
    runs-on: windows-latest
    steps:
      - name: Checkout prepared STALKER branch
        uses: actions/checkout@v4
        with:
          ref: agent/stalker-approved-exact-v4
          fetch-depth: 0
          persist-credentials: true

      - name: Verify uploaded approved archive
        shell: pwsh
        run: |
          $archive = Get-ChildItem "TiHiY-Stalker-Approved-Exact-Patch-v4*.zip" | Select-Object -First 1
          if (-not $archive) { throw "Approved STALKER v4 ZIP was not found." }
          $expected = "c222def9a4abfe513a507349d9e617c6ae5bf15f4de36bf37e2baec7b1807c4f"
          $actual = (Get-FileHash $archive.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Approved archive SHA256 mismatch: $actual" }
          "STALKER_ARCHIVE=$($archive.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Approved archive verified: $actual"

      - name: Extract exact source and runtime
        shell: pwsh
        run: |
          $extract = Join-Path $env:RUNNER_TEMP "stalker-v4-approved"
          Remove-Item $extract -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive $env:STALKER_ARCHIVE $extract -Force

          $manifest = Get-ChildItem $extract -Filter "approved-crop-manifest.json" -Recurse | Select-Object -First 1
          if (-not $manifest) { throw "approved-crop-manifest.json was not found in the ZIP." }
          $root = $manifest.Directory.FullName

          New-Item -ItemType Directory -Force "Assets/Themes/StalkerApproved" | Out-Null
          New-Item -ItemType Directory -Force "Build" | Out-Null
          New-Item -ItemType Directory -Force "Services" | Out-Null

          Copy-Item "$root/Assets/Themes/StalkerApproved/*" "Assets/Themes/StalkerApproved/" -Recurse -Force
          Copy-Item "$root/Build/*" "Build/" -Recurse -Force
          Copy-Item "$root/Services/*" "Services/" -Recurse -Force
          Copy-Item "$root/StalkerApprovedExact.targets" "StalkerApprovedExact.targets" -Force
          Copy-Item "$root/approved-crop-manifest.json" "approved-crop-manifest.json" -Force
          Copy-Item "$root/approved-layout-manifest.json" "approved-layout-manifest.json" -Force
          if (Test-Path "$root/README-UA.txt") { Copy-Item "$root/README-UA.txt" "README-STALKER-V4-UA.txt" -Force }
          if (Test-Path "$root/IMPLEMENTATION-MAP-UA.md") { Copy-Item "$root/IMPLEMENTATION-MAP-UA.md" "STALKER-V4-IMPLEMENTATION-MAP-UA.md" -Force }
          if (Test-Path "$root/VALIDATION-REPORT.txt") { Copy-Item "$root/VALIDATION-REPORT.txt" "STALKER-V4-VALIDATION-REPORT.txt" -Force }

      - name: Fix imported WPF Thickness constructor
        shell: pwsh
        run: |
          $runtime = "Services/StalkerApprovedTextureRuntime.cs"
          $text = Get-Content $runtime -Raw
          $old = "border.Margin = new Thickness(5, 2);"
          $new = "border.Margin = new Thickness(5, 2, 5, 2);"
          if (-not $text.Contains($old)) { throw "Expected invalid Thickness expression was not found." }
          $text = $text.Replace($old, $new)
          Set-Content $runtime $text -Encoding utf8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Import exact targets into WPF project
        shell: pwsh
        run: |
          $project = "TiHiY.StreamControlCenter.csproj"
          $text = Get-Content $project -Raw
          if ($text -notmatch 'StalkerApprovedExact\.targets') {
            $text = $text -replace '</Project>\s*$', '  <Import Project="StalkerApprovedExact.targets" Condition="Exists(''StalkerApprovedExact.targets'')" />`r`n</Project>`r`n'
            Set-Content $project $text -Encoding utf8
          }

      - name: Verify exact crops and real grid layout
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File Build/Verify-Approved-Stalker-Crops.ps1 -ProjectDir .
          pwsh -NoProfile -ExecutionPolicy Bypass -File Build/Verify-Stalker-Layout-Targets.ps1 -ProjectDir .

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore and Release Build
        run: |
          dotnet restore TiHiY.StreamControlCenter.sln
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore

      - name: Publish and capture real STALKER window
        shell: pwsh
        run: |
          dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish
          New-Item -ItemType Directory -Force preview | Out-Null
          $shot = Join-Path $PWD "preview/TiHiY-Stalker-Approved-v4.png"
          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          $p = Start-Process $exe -ArgumentList "--ci-screenshot=$shot","--ci-apply-stalker-theme","--ci-language=uk-UA" -PassThru
          if (-not $p.WaitForExit(60000)) { $p.Kill($true); throw "Application launch timed out." }
          if ($p.ExitCode -ne 0) { throw "Application exited with code $($p.ExitCode)." }
          if (-not (Test-Path $shot)) { throw "STALKER v4 screenshot was not created." }

      - name: Remove transport files
        shell: pwsh
        run: |
          Get-ChildItem "TiHiY-Stalker-Approved-Exact-Patch-v4*.zip" | Remove-Item -Force
          Remove-Item .github/workflows/stalker-v4-bootstrap.yml -Force

      - name: Commit completed STALKER v4 patch
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Додати точний патч STALKER v4 з погодженими текстурами"
          git push origin HEAD:agent/stalker-approved-exact-v4

      - name: Upload verified Windows build and screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-STALKER-v4-verification
          path: |
            publish/**
            preview/**
          if-no-files-found: warn
