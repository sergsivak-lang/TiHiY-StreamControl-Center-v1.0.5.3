name: Import exact Git tree from run 29557749076

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-exact-tree:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[import-29557749076]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination branch
        uses: actions/checkout@v4
        with:
          ref: feature/stalker-theme-and-chat-fixes
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch exact source commit
        shell: bash
        run: |
          set -euo pipefail
          git remote remove source 2>/dev/null || true
          git remote add source https://github.com/sergsivak-lang/TiHiY-StreamControl-Center.git
          git fetch --no-tags source 92cf943e0445a980b0322bdfaa0339faa21bdc2b
          test "$(git rev-parse FETCH_HEAD)" = "92cf943e0445a980b0322bdfaa0339faa21bdc2b"

      - name: Replace branch tree with source snapshot
        shell: bash
        run: |
          set -euo pipefail
          git rm -r -f --ignore-unmatch .
          git checkout FETCH_HEAD -- .

          test -f TiHiY.StreamControlCenter.sln
          test -f TiHiY.StreamControlCenter.csproj
          test -f MainWindow.xaml
          test -f Themes/StalkerReference.xaml
          test -f Themes/UkraineReference.xaml
          test "$(cat VERSION.txt)" = "v1.0.5.3-UKRAINE-REFERENCE-THEME"

          git status --short

      - name: Commit exact imported Git tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import exact tree from run 29557749076 (92cf943)"
          git push origin HEAD:feature/stalker-theme-and-chat-fixes
