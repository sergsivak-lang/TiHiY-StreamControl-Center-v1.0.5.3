name: Fix STALKER resource URI

on:
  push:
    branches:
      - agent/stalker-approved-exact-v4
    paths:
      - ".github/workflows/fix-stalker-resource-uri.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stalker-approved-exact-v4
          fetch-depth: 0
          persist-credentials: true

      - name: Fix WPF pack resource URI
        shell: pwsh
        run: |
          $path = "Services/StalkerApprovedTextureRuntime.cs"
          $text = Get-Content $path -Raw
          $oldRoot = 'internal const string Root = "/TiHiY.StreamControlCenter;component/Assets/Themes/StalkerApproved/";'
          $newRoot = 'internal const string Root = "pack://application:,,,/Assets/Themes/StalkerApproved/";'
          if (-not $text.Contains($oldRoot)) { throw "Expected STALKER resource root was not found." }
          $text = $text.Replace($oldRoot, $newRoot)
          $text = $text.Replace('image.UriSource = new Uri(Root + file, UriKind.Relative);', 'image.UriSource = new Uri(Root + file, UriKind.Absolute);')
          Set-Content $path $text -Encoding utf8

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore and build
        shell: pwsh
        run: |
          dotnet restore TiHiY.StreamControlCenter.sln
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore

      - name: Publish and launch STALKER theme
        shell: pwsh
        run: |
          dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish
          New-Item -ItemType Directory -Force preview | Out-Null
          $shot = Join-Path $PWD "preview/TiHiY-Stalker-Approved-v4-resource-fix.png"
          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          $p = Start-Process $exe -ArgumentList "--ci-screenshot=$shot","--ci-apply-stalker-theme","--ci-language=uk-UA" -PassThru
          if (-not $p.WaitForExit(60000)) { $p.Kill($true); throw "Application launch timed out." }
          if ($p.ExitCode -ne 0) { throw "Application exited with code $($p.ExitCode)." }
          if (-not (Test-Path $shot)) { throw "Verification screenshot was not created." }

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-STALKER-v4-resource-fix
          path: |
            publish/**
            preview/**

      - name: Commit verified source fix
        shell: pwsh
        run: |
          Remove-Item publish -Recurse -Force
          Remove-Item preview -Recurse -Force
          Remove-Item .github/workflows/fix-stalker-resource-uri.yml -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Виправити URI вбудованих текстур STALKER v4"
          git push origin HEAD:agent/stalker-approved-exact-v4
