name: Fix STALKER isolation and Ukraine restore

on:
  push:
    branches:
      - agent/stalker-approved-exact-v4
    paths:
      - ".github/workflows/fix-theme-isolation-and-ukraine-restore.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-theme-isolation:
    runs-on: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/stalker-approved-exact-v4
          fetch-depth: 0
          persist-credentials: true

      - name: Patch STALKER runtime isolation
        shell: pwsh
        run: |
          $path = "Services/StalkerApprovedTextureRuntime.cs"
          $text = Get-Content $path -Raw

          # Remove polling timers from both main and settings runtimes.
          $text = $text -replace '(?m)^\s*private readonly DispatcherTimer _timer;\r?\n', ''
          $text = [regex]::Replace($text, '(?ms)\s*_timer = new DispatcherTimer\(DispatcherPriority\.Background, window\.Dispatcher\)\s*\{\s*Interval = TimeSpan\.FromMilliseconds\(\d+\)\s*\};\s*_timer\.Tick \+= TimerTick;\s*', "`r`n")
          $text = $text -replace '(?m)^\s*_timer\.Start\(\);\r?\n', ''
          $text = [regex]::Replace($text, '(?ms)\r?\n\s*private void TimerTick\(object\? sender, EventArgs e\)\s*\{.*?\r?\n\s*\}\r?\n', "`r`n")
          $text = $text -replace '(?m)^\s*_timer\.Stop\(\);\r?\n', ''
          $text = $text -replace '(?m)^\s*_timer\.Tick -= TimerTick;\r?\n', ''

          # Replace main ApplyNow with transition-aware behavior.
          $old = @'
        private void ApplyNow()
        {
            if (_disposed || !_window.IsLoaded) return;
            var stalker = StalkerApprovedAssets.IsStalkerTheme();
            ApplyRoot(stalker);
            ApplyExactHeaderAndOuterFrame(stalker);
            ApplyExactPanelShells(stalker);
            ApplyExactCenterPanel(stalker);
            ApplyAidaMetricLayout(stalker);
            ApplyLiveControls(stalker);
            ApplyTypography(stalker);
            ApplyArtworkVisibility(stalker);
            _lastStalker = stalker;
        }
'@
          $new = @'
        private void ApplyNow()
        {
            if (_disposed || !_window.IsLoaded) return;
            var stalker = StalkerApprovedAssets.IsStalkerTheme();

            if (stalker)
            {
                ApplyRoot(true);
                ApplyExactHeaderAndOuterFrame(true);
                ApplyExactPanelShells(true);
                ApplyExactCenterPanel(true);
                ApplyAidaMetricLayout(true);
                ApplyLiveControls(true);
                ApplyTypography(true);
                ApplyArtworkVisibility(true);
            }
            else if (_lastStalker)
            {
                // Do not restore stale snapshots over the newly selected theme.
                // Removing local STALKER values lets DynamicResource/style values
                // of Ukraine, Military, Dark or Default become active again.
                ClearStalkerOverrides();
            }

            _lastStalker = stalker;
        }

        private void ClearStalkerOverrides()
        {
            foreach (var parts in _decorations.Values)
                SetVisibility(parts, false);

            foreach (var border in _borderStates.Keys)
            {
                border.ClearValue(Border.BackgroundProperty);
                border.ClearValue(Border.BorderBrushProperty);
                border.ClearValue(Border.BorderThicknessProperty);
                border.ClearValue(Border.CornerRadiusProperty);
            }

            foreach (var block in _contentStates.Keys)
            {
                block.ClearValue(Control.BackgroundProperty);
                block.ClearValue(Control.BorderBrushProperty);
                block.ClearValue(Control.BorderThicknessProperty);
                block.ClearValue(Control.PaddingProperty);
            }

            foreach (var control in _controlStates.Keys)
            {
                control.ClearValue(Control.BackgroundProperty);
                control.ClearValue(Control.BorderBrushProperty);
                control.ClearValue(Control.BorderThicknessProperty);
                control.ClearValue(Control.ForegroundProperty);
                control.ClearValue(Control.FontFamilyProperty);
            }

            foreach (var text in _textStates.Keys)
            {
                text.ClearValue(TextBlock.ForegroundProperty);
                text.ClearValue(TextBlock.FontFamilyProperty);
                text.ClearValue(TextBlock.FontWeightProperty);
            }

            foreach (var element in _opacityStates.Keys)
                element.ClearValue(UIElement.OpacityProperty);

            foreach (var border in _metricStates.Keys)
            {
                border.ClearValue(FrameworkElement.WidthProperty);
                border.ClearValue(FrameworkElement.HeightProperty);
                border.ClearValue(FrameworkElement.MarginProperty);
                border.ClearValue(Border.BackgroundProperty);
                border.ClearValue(Border.BorderBrushProperty);
                border.ClearValue(Border.BorderThicknessProperty);
                border.ClearValue(Border.CornerRadiusProperty);
            }

            _borderStates.Clear();
            _contentStates.Clear();
            _controlStates.Clear();
            _textStates.Clear();
            _opacityStates.Clear();
            _metricStates.Clear();

            _window.InvalidateVisual();
            _window.InvalidateMeasure();
            _window.InvalidateArrange();
        }
'@
          if (-not $text.Contains($old)) { throw "Main ApplyNow block not found" }
          $text = $text.Replace($old, $new)

          # Settings window: same transition behavior, without stale restoration.
          $oldSettings = @'
        private void ApplyNow()
        {
            var stalker = StalkerApprovedAssets.IsStalkerTheme();
            ApplyBorders(stalker);
            ApplyControls(stalker);
            ApplyImages(stalker);
            ApplyTexts(stalker);
            _lastStalker = stalker;
        }
'@
          $newSettings = @'
        private void ApplyNow()
        {
            var stalker = StalkerApprovedAssets.IsStalkerTheme();
            if (stalker)
            {
                ApplyBorders(true);
                ApplyControls(true);
                ApplyImages(true);
                ApplyTexts(true);
            }
            else if (_lastStalker)
            {
                foreach (var border in _borders.Keys)
                {
                    border.ClearValue(Border.BackgroundProperty);
                    border.ClearValue(Border.BorderBrushProperty);
                    border.ClearValue(Border.BorderThicknessProperty);
                    border.ClearValue(Border.CornerRadiusProperty);
                }
                foreach (var control in _controls.Keys)
                {
                    control.ClearValue(Control.BackgroundProperty);
                    control.ClearValue(Control.BorderBrushProperty);
                    control.ClearValue(Control.BorderThicknessProperty);
                    control.ClearValue(Control.ForegroundProperty);
                    control.ClearValue(Control.FontFamilyProperty);
                }
                foreach (var image in _images.Keys)
                {
                    image.ClearValue(UIElement.VisibilityProperty);
                    image.ClearValue(UIElement.OpacityProperty);
                }
                foreach (var text in _texts.Keys)
                {
                    text.ClearValue(TextBlock.ForegroundProperty);
                    text.ClearValue(TextBlock.FontFamilyProperty);
                    text.ClearValue(TextBlock.FontWeightProperty);
                    text.ClearValue(UIElement.OpacityProperty);
                }
                _borders.Clear();
                _controls.Clear();
                _images.Clear();
                _texts.Clear();
                _window.InvalidateVisual();
            }
            _lastStalker = stalker;
        }
'@
          if (-not $text.Contains($oldSettings)) { throw "Settings ApplyNow block not found" }
          $text = $text.Replace($oldSettings, $newSettings)

          Set-Content $path $text -Encoding utf8

          if ((Get-Content $path -Raw) -match 'DispatcherTimer _timer|TimerTick') {
            throw "Polling timer remains in STALKER texture runtime"
          }

      - name: Patch layout snapshot lifecycle
        shell: pwsh
        run: |
          $path = "Services/StalkerApprovedLayoutRuntime.cs"
          $text = Get-Content $path -Raw
          $text = $text -replace '(?m)^\s*private readonly DispatcherTimer _timer;\r?\n', ''
          $text = [regex]::Replace($text, '(?ms)\s*_timer = new DispatcherTimer\(DispatcherPriority\.Background, window\.Dispatcher\)\s*\{\s*Interval = TimeSpan\.FromMilliseconds\(\d+\)\s*\};\s*_timer\.Tick \+= TimerTick;\s*', "`r`n")
          $text = $text -replace '(?m)^\s*_timer\.Start\(\);\r?\n', ''
          $text = [regex]::Replace($text, '(?ms)\r?\n\s*private void TimerTick\(object\? sender, EventArgs e\)\s*\{.*?\r?\n\s*\}\r?\n', "`r`n")
          $text = $text -replace '(?m)^\s*_timer\.Stop\(\);\r?\n', ''
          $text = $text -replace '(?m)^\s*_timer\.Tick -= TimerTick;\r?\n', ''
          $text = $text.Replace("            _window.WindowState = WindowState.Normal;`r`n", "")
          $text = $text.Replace("            _window.MaxWidth = Math.Max(DesignWidth, work.Width);", "            _window.MaxWidth = double.PositiveInfinity;")
          $text = $text.Replace("            _window.MaxHeight = Math.Max(DesignHeight, work.Height);", "            _window.MaxHeight = double.PositiveInfinity;")
          $text = $text.Replace("            _window.Width = DesignWidth;", "            if (_window.WindowState == WindowState.Normal && _window.Width < 1200) _window.Width = Math.Min(DesignWidth, work.Width);")
          $text = $text.Replace("            _window.Height = DesignHeight;", "            if (_window.WindowState == WindowState.Normal && _window.Height < 700) _window.Height = Math.Min(DesignHeight, work.Height);")
          Set-Content $path $text -Encoding utf8
          if ((Get-Content $path -Raw) -match 'DispatcherTimer _timer|TimerTick') { throw "Layout timer remains" }

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build and publish
        shell: pwsh
        run: |
          dotnet restore TiHiY.StreamControlCenter.sln
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore
          dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish

      - name: Commit fix and cleanup
        shell: pwsh
        run: |
          Remove-Item publish -Recurse -Force
          Remove-Item .github/workflows/fix-theme-isolation-and-ukraine-restore.yml -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Ізолювати STALKER та повністю відновлювати інші теми"
          git push origin HEAD:agent/stalker-approved-exact-v4
