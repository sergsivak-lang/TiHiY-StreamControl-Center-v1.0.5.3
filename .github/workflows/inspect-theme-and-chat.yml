name: Inspect theme and chat architecture

on:
  push:
    branches:
      - agent/stalker-approved-exact-v4
    paths:
      - ".github/workflows/inspect-theme-and-chat.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stalker-approved-exact-v4
          fetch-depth: 0
          persist-credentials: true

      - name: Generate architecture report
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $patterns = @('Twitch','ChatMessage','Emote','emotes','IRC','PRIVMSG','DispatcherTimer','CompositionTarget','InvalidateVisual','ThemeChanged','CurrentTheme','ApplyTheme','ResourceDictionary')
          $files = Get-ChildItem -Recurse -File -Include *.cs,*.xaml,*.csproj,*.targets | Where-Object { $_.FullName -notmatch '\\(bin|obj|publish)\\' }
          $lines = New-Object System.Collections.Generic.List[string]
          $lines.Add('# Theme and Chat Architecture Inspection')
          $lines.Add('')
          $lines.Add("Generated: $(Get-Date -Format o)")
          $lines.Add('')
          foreach ($pattern in $patterns) {
            $lines.Add("## Pattern: $pattern")
            $matches = $files | Select-String -Pattern $pattern -SimpleMatch
            if (-not $matches) { $lines.Add('(no matches)') }
            else {
              foreach ($m in $matches) {
                $relative = [IO.Path]::GetRelativePath($PWD, $m.Path)
                $lines.Add("- ${relative}:$($m.LineNumber): $($m.Line.Trim())")
              }
            }
            $lines.Add('')
          }
          $lines | Set-Content THEME-CHAT-INSPECTION.md -Encoding utf8

      - name: Commit inspection report
        shell: pwsh
        run: |
          Remove-Item .github/workflows/inspect-theme-and-chat.yml -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Додати карту архітектури тем і Twitch-чату"
          git push origin HEAD:agent/stalker-approved-exact-v4
