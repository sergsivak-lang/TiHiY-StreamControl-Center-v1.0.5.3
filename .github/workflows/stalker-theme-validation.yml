name: Stalker Theme Validation

on:
  pull_request_target:
    types: [reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-stalker-theme:
    runs-on: windows-latest
    steps:
      - name: Checkout Stalker feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || 'feature/stalker-theme-v1' }}
          fetch-depth: 0
          persist-credentials: true

      - name: Verify implementation files
        shell: pwsh
        run: |
          $required = @(
            "TiHiY.StreamControlCenter.sln",
            "TiHiY.StreamControlCenter.csproj",
            "Themes/StalkerReference.xaml",
            "Services/StalkerThemeRuntime.cs",
            "Services/StalkerThemeFinalizer.cs",
            "Services/StalkerCiBootstrap.cs",
            "Services/StalkerSettingsCiRuntime.cs",
            "Build/Generate-StalkerAssets.ps1",
            "Windows/SettingsWindow.xaml.cs"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Missing STALKER file: $file" }
          }
          Write-Host "STALKER implementation files verified."

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore TiHiY.StreamControlCenter.sln

      - name: Release Build
        shell: pwsh
        run: |
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore *> build.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content build.log | Select-Object -Last 350 | Set-Content build-errors.txt -Encoding utf8
            Get-Content build-errors.txt | ForEach-Object { Write-Host $_ }
            exit $LASTEXITCODE
          }
          "Build completed successfully." | Set-Content build-errors.txt -Encoding utf8

      - name: Verify generated Stalker assets
        shell: pwsh
        run: |
          $assets = @(
            "Assets/Themes/stalker_zone.png",
            "Assets/Themes/stalker_symbol.png",
            "Assets/Themes/StalkerExact/rusted-metal.png",
            "Assets/Themes/StalkerExact/scratches.png",
            "Assets/Themes/StalkerExact/hazard-corner.png",
            "Assets/Themes/StalkerExact/stalker-symbol.png",
            "Assets/Themes/StalkerExact/zone-banner.png",
            "Assets/Themes/StalkerExact/zone-header.png"
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path $asset)) { throw "Missing generated asset: $asset" }
            if ((Get-Item $asset).Length -lt 1000) { throw "Generated asset is too small: $asset" }
          }
          Write-Host "STALKER generated assets verified."

      - name: Publish self-contained win-x64
        run: dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish

      - name: Launch real EXE and capture Stalker main window
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path preview | Out-Null
          $shot = Join-Path $PWD "preview/TiHiY-Stalker-Theme-Real.png"
          $log = Join-Path $PWD "preview/stalker-smoke-test.log"
          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          $process = $null
          try {
            $startInfo = [Diagnostics.ProcessStartInfo]::new()
            $startInfo.FileName = $exe
            $startInfo.WorkingDirectory = Split-Path $exe
            $startInfo.UseShellExecute = $false
            $startInfo.CreateNoWindow = $true
            $startInfo.RedirectStandardOutput = $true
            $startInfo.RedirectStandardError = $true
            $startInfo.ArgumentList.Add("--ci-screenshot=$shot")
            $startInfo.ArgumentList.Add("--ci-apply-stalker-theme")
            $startInfo.ArgumentList.Add("--ci-language=uk-UA")
            $process = [Diagnostics.Process]::new()
            $process.StartInfo = $startInfo
            if (-not $process.Start()) { throw "Process.Start returned false." }
            $stdoutTask = $process.StandardOutput.ReadToEndAsync()
            $stderrTask = $process.StandardError.ReadToEndAsync()
            if (-not $process.WaitForExit(60000)) {
              $process.Kill($true)
              $process.WaitForExit()
              throw "STALKER application launch timed out."
            }
            $stdout = $stdoutTask.GetAwaiter().GetResult()
            $stderr = $stderrTask.GetAwaiter().GetResult()
            "Exit code: $($process.ExitCode)`nSTDOUT:`n$stdout`nSTDERR:`n$stderr" | Set-Content $log -Encoding utf8
            if ($process.ExitCode -ne 0) { throw "STALKER EXE exited with code $($process.ExitCode)." }
            if (-not (Test-Path $shot)) { throw "STALKER screenshot was not created." }
            if ((Get-Item $shot).Length -lt 25000) { throw "STALKER screenshot is unexpectedly small." }
          }
          finally {
            if ($process) { $process.Dispose() }
          }

      - name: Launch settings and capture Stalker theme selection
        shell: pwsh
        run: |
          $shot = Join-Path $PWD "preview/TiHiY-Stalker-Theme-Settings-Selection.png"
          $log = Join-Path $PWD "preview/stalker-settings-smoke-test.log"
          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          $process = $null
          try {
            $startInfo = [Diagnostics.ProcessStartInfo]::new()
            $startInfo.FileName = $exe
            $startInfo.WorkingDirectory = Split-Path $exe
            $startInfo.UseShellExecute = $false
            $startInfo.CreateNoWindow = $true
            $startInfo.RedirectStandardOutput = $true
            $startInfo.RedirectStandardError = $true
            $startInfo.ArgumentList.Add("--ci-screenshot=$shot")
            $startInfo.ArgumentList.Add("--ci-apply-stalker-theme")
            $startInfo.ArgumentList.Add("--ci-open-settings")
            $startInfo.ArgumentList.Add("--ci-settings-theme-preview")
            $startInfo.ArgumentList.Add("--ci-language=uk-UA")
            $process = [Diagnostics.Process]::new()
            $process.StartInfo = $startInfo
            if (-not $process.Start()) { throw "Settings Process.Start returned false." }
            $stdoutTask = $process.StandardOutput.ReadToEndAsync()
            $stderrTask = $process.StandardError.ReadToEndAsync()
            if (-not $process.WaitForExit(60000)) {
              $process.Kill($true)
              $process.WaitForExit()
              throw "STALKER settings launch timed out."
            }
            $stdout = $stdoutTask.GetAwaiter().GetResult()
            $stderr = $stderrTask.GetAwaiter().GetResult()
            "Exit code: $($process.ExitCode)`nSTDOUT:`n$stdout`nSTDERR:`n$stderr" | Set-Content $log -Encoding utf8
            if ($process.ExitCode -ne 0) { throw "STALKER settings exited with code $($process.ExitCode)." }
            if (-not (Test-Path $shot)) { throw "STALKER settings screenshot was not created." }
            if ((Get-Item $shot).Length -lt 25000) { throw "STALKER settings screenshot is unexpectedly small." }
          }
          finally {
            if ($process) { $process.Dispose() }
          }

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stalker-build-diagnostics
          path: |
            build.log
            build-errors.txt
          if-no-files-found: warn

      - name: Upload program and Stalker screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-Stalker-Theme-Verification
          path: |
            publish/**
            preview/**
          if-no-files-found: warn

      - name: Publish validation report branch
        if: always()
        shell: pwsh
        env:
          VALIDATION_STATUS: ${{ job.status }}
          VALIDATED_SHA: ${{ github.event.pull_request.head.sha || 'feature/stalker-theme-v1' }}
        run: |
          $stash = Join-Path $env:RUNNER_TEMP "stalker-validation-output"
          Remove-Item $stash -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stash | Out-Null
          @(
            "status=$env:VALIDATION_STATUS",
            "validated_sha=$env:VALIDATED_SHA",
            "run_id=${{ github.run_id }}",
            "run_attempt=${{ github.run_attempt }}",
            "completed_utc=$([DateTime]::UtcNow.ToString('O'))"
          ) | Set-Content (Join-Path $stash "validation-result.txt") -Encoding utf8
          if (Test-Path build.log) { Copy-Item build.log $stash -Force }
          if (Test-Path build-errors.txt) { Copy-Item build-errors.txt $stash -Force }
          if (Test-Path preview) { Copy-Item preview (Join-Path $stash "preview") -Recurse -Force }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan ci-stalker-results-temp
          git rm -rf . 2>$null
          git clean -fdx
          New-Item -ItemType Directory -Force -Path validation-output | Out-Null
          Copy-Item (Join-Path $stash "*") validation-output -Recurse -Force
          git add validation-output
          git commit --allow-empty -m "CI: результат перевірки теми Сталкер ${{ github.run_id }}"
          git push --force origin HEAD:ci/stalker-theme-results
