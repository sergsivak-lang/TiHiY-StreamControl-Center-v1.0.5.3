name: Import exact state from run 29557749076

on:
  push:
    branches:
      - feature/stalker-theme-and-chat-fixes

permissions:
  contents: write

jobs:
  import-exact-source-state:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: feature/stalker-theme-and-chat-fixes
          fetch-depth: 0

      - name: Import exact source commit
        shell: bash
        run: |
          set -euo pipefail
          git clone --no-checkout https://github.com/sergsivak-lang/TiHiY-StreamControl-Center.git source-repository
          git -C source-repository checkout --detach 92cf943e0445a980b0322bdfaa0339faa21bdc2b

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name 'source-repository' \
            -exec rm -rf {} +

          rsync -a --delete --exclude='.git/' source-repository/ ./
          rm -rf source-repository

          test "$(git -C . rev-parse --is-inside-work-tree)" = "true"
          test -f TiHiY.StreamControlCenter.csproj
          test -f MainWindow.xaml
          test -f Themes/UkraineReference.xaml

      - name: Commit exact imported snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import exact state from source run 29557749076 (92cf943)"
          git push origin HEAD:feature/stalker-theme-and-chat-fixes
