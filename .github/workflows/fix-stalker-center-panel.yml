name: Fix STALKER center panel

on:
  push:
    branches:
      - agent/stalker-approved-exact-v4
    paths:
      - ".github/workflows/fix-stalker-center-panel.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-center-panel:
    runs-on: windows-latest
    steps:
      - name: Checkout STALKER v4 branch
        uses: actions/checkout@v4
        with:
          ref: agent/stalker-approved-exact-v4
          fetch-depth: 0
          persist-credentials: true

      - name: Restore exact center artwork
        shell: pwsh
        run: |
          $path = "Services/StalkerApprovedTextureRuntime.cs"
          $text = Get-Content $path -Raw
          $old = @'
            foreach (var child in StalkerApprovedAssets.FindDescendants<UIElement>(center).Where(x => !ReferenceEquals(x, center)))
                SetOpacity(child, stalker ? 0 : RestoreOpacity(child));
'@
          $new = @'
            // Keep the existing center content hidden only while the exact approved
            // artwork is shown. The approved banner is added as a real child so the
            // footer centre cannot collapse into an empty black rectangle.
            var host = center.Content as Panel;
            if (host is not null)
            {
                var parts = EnsureDecorations(host, () =>
                {
                    var artwork = StalkerApprovedAssets.NewImage("center-zone-banner.png", Stretch.UniformToFill);
                    artwork.HorizontalAlignment = HorizontalAlignment.Stretch;
                    artwork.VerticalAlignment = VerticalAlignment.Stretch;
                    artwork.Margin = new Thickness(8, 8, 8, 8);
                    Panel.SetZIndex(artwork, 500);
                    host.Children.Add(artwork);
                    return new UIElement[] { artwork };
                });
                SetVisibility(parts, stalker);

                foreach (var child in StalkerApprovedAssets.FindDescendants<UIElement>(host)
                             .Where(x => !parts.Contains(x)))
                    SetOpacity(child, stalker ? 0 : RestoreOpacity(child));
            }
'@
          if (-not $text.Contains($old)) { throw "Expected empty-center code block was not found." }
          $text = $text.Replace($old, $new)
          Set-Content $path $text -Encoding utf8

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build and capture corrected window
        shell: pwsh
        run: |
          dotnet restore TiHiY.StreamControlCenter.sln
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore
          dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish
          New-Item -ItemType Directory -Force preview | Out-Null
          $shot = Join-Path $PWD "preview/TiHiY-Stalker-v4-center-fixed.png"
          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          $p = Start-Process $exe -ArgumentList "--ci-screenshot=$shot","--ci-apply-stalker-theme","--ci-language=uk-UA" -PassThru
          if (-not $p.WaitForExit(60000)) { $p.Kill($true); throw "Application launch timed out." }
          if ($p.ExitCode -ne 0) { throw "Application exited with code $($p.ExitCode)." }
          if (-not (Test-Path $shot)) { throw "Corrected screenshot was not created." }

      - name: Upload corrected screenshot and build
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-STALKER-v4-center-fixed
          path: |
            publish/**
            preview/**

      - name: Commit correction and remove generated outputs
        shell: pwsh
        run: |
          Remove-Item publish -Recurse -Force
          Remove-Item preview -Recurse -Force
          Remove-Item .github/workflows/fix-stalker-center-panel.yml -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Заповнити нижній центральний блок теми STALKER"
          git push origin HEAD:agent/stalker-approved-exact-v4
