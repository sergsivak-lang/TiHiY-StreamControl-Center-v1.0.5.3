name: Validate Stalker Theme

on:
  pull_request:
    branches: ["ci/stalker-theme-validation-base"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout PR merge
        uses: actions/checkout@v4

      - name: Verify Stalker implementation
        shell: pwsh
        run: |
          $required = @(
            "TiHiY.StreamControlCenter.sln",
            "TiHiY.StreamControlCenter.csproj",
            "Themes/StalkerReference.xaml",
            "Services/StalkerThemeRuntime.cs",
            "Services/StalkerCiBootstrap.cs",
            "Build/Generate-StalkerAssets.ps1",
            "Windows/SettingsWindow.xaml.cs"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Missing STALKER file: $file" }
          }

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore TiHiY.StreamControlCenter.sln

      - name: Release Build
        shell: pwsh
        run: |
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore *> build.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content build.log | Select-Object -Last 300 | Set-Content build-errors.txt -Encoding utf8
            Get-Content build-errors.txt
            exit $LASTEXITCODE
          }
          "Build completed successfully." | Set-Content build-errors.txt -Encoding utf8

      - name: Verify generated assets
        shell: pwsh
        run: |
          $assets = @(
            "Assets/Themes/stalker_zone.png",
            "Assets/Themes/stalker_symbol.png",
            "Assets/Themes/StalkerExact/rusted-metal.png",
            "Assets/Themes/StalkerExact/scratches.png",
            "Assets/Themes/StalkerExact/hazard-corner.png",
            "Assets/Themes/StalkerExact/stalker-symbol.png",
            "Assets/Themes/StalkerExact/zone-banner.png",
            "Assets/Themes/StalkerExact/zone-header.png"
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path $asset)) { throw "Missing generated asset: $asset" }
            if ((Get-Item $asset).Length -lt 1000) { throw "Generated asset is too small: $asset" }
          }

      - name: Publish self-contained win-x64
        run: dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish

      - name: Launch real EXE in Stalker theme
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path preview | Out-Null
          $shot = Join-Path $PWD "preview/TiHiY-Stalker-Theme-Real.png"
          $log = Join-Path $PWD "preview/stalker-smoke-test.log"
          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          $process = $null
          try {
            $startInfo = [Diagnostics.ProcessStartInfo]::new()
            $startInfo.FileName = $exe
            $startInfo.WorkingDirectory = Split-Path $exe
            $startInfo.UseShellExecute = $false
            $startInfo.CreateNoWindow = $true
            $startInfo.RedirectStandardOutput = $true
            $startInfo.RedirectStandardError = $true
            $startInfo.ArgumentList.Add("--ci-screenshot=$shot")
            $startInfo.ArgumentList.Add("--ci-language=uk-UA")
            $process = [Diagnostics.Process]::new()
            $process.StartInfo = $startInfo
            if (-not $process.Start()) { throw "Process.Start returned false." }
            $stdoutTask = $process.StandardOutput.ReadToEndAsync()
            $stderrTask = $process.StandardError.ReadToEndAsync()
            if (-not $process.WaitForExit(60000)) {
              $process.Kill($true)
              $process.WaitForExit()
              throw "STALKER application launch timed out."
            }
            $stdout = $stdoutTask.GetAwaiter().GetResult()
            $stderr = $stderrTask.GetAwaiter().GetResult()
            "Exit code: $($process.ExitCode)`nSTDOUT:`n$stdout`nSTDERR:`n$stderr" | Set-Content $log -Encoding utf8
            if ($process.ExitCode -ne 0) { throw "STALKER EXE exited with code $($process.ExitCode)." }
            if (-not (Test-Path $shot)) { throw "STALKER screenshot was not created." }
            if ((Get-Item $shot).Length -lt 25000) { throw "STALKER screenshot is unexpectedly small." }
          }
          finally {
            if ($process) { $process.Dispose() }
          }

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stalker-build-diagnostics
          path: |
            build.log
            build-errors.txt
          if-no-files-found: warn

      - name: Upload Stalker build and screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-Stalker-Theme-Verification
          path: |
            publish/**
            preview/**
          if-no-files-found: warn
