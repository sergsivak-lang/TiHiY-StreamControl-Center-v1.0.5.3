name: Validate Imported Run 29557749076

on:
  pull_request:
    types: [reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-run-imported-branch:
    runs-on: windows-latest
    steps:
      - name: Checkout imported branch
        uses: actions/checkout@v4
        with:
          ref: feature/stalker-theme-and-chat-fixes

      - name: Verify imported identity
        shell: pwsh
        run: |
          $version = (Get-Content VERSION.txt -Raw).Trim()
          if ($version -ne "v1.0.5.3-UKRAINE-REFERENCE-THEME") {
            throw "Unexpected imported version: $version"
          }
          $required = @(
            "TiHiY.StreamControlCenter.sln",
            "TiHiY.StreamControlCenter.csproj",
            "MainWindow.xaml",
            "Themes/UkraineReference.xaml",
            "Themes/StalkerReference.xaml",
            "Controls/RichChatTextBlock.cs"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Missing imported file: $file" }
          }
          Write-Host "Imported program identity verified: $version"

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore TiHiY.StreamControlCenter.sln

      - name: Release Build
        shell: pwsh
        run: |
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore *> build.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content build.log | Select-Object -Last 200
            exit $LASTEXITCODE
          }
          Write-Host "Release Build completed successfully."

      - name: Publish self-contained win-x64
        run: dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish

      - name: Launch EXE and capture real window
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path verification | Out-Null
          $shot = Join-Path $PWD "verification/TiHiY-Imported-29557749076-Real.png"
          $log = Join-Path $PWD "verification/smoke-test.log"
          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          $process = $null

          try {
            $startInfo = [Diagnostics.ProcessStartInfo]::new()
            $startInfo.FileName = $exe
            $startInfo.WorkingDirectory = Split-Path $exe
            $startInfo.UseShellExecute = $false
            $startInfo.CreateNoWindow = $true
            $startInfo.RedirectStandardOutput = $true
            $startInfo.RedirectStandardError = $true
            $startInfo.ArgumentList.Add("--ci-screenshot=$shot")
            $startInfo.ArgumentList.Add("--ci-apply-ukraine-theme")
            $startInfo.ArgumentList.Add("--ci-language=uk-UA")

            $process = [Diagnostics.Process]::new()
            $process.StartInfo = $startInfo
            if (-not $process.Start()) { throw "Process.Start returned false." }

            $stdoutTask = $process.StandardOutput.ReadToEndAsync()
            $stderrTask = $process.StandardError.ReadToEndAsync()

            if (-not $process.WaitForExit(60000)) {
              $process.Kill($true)
              $process.WaitForExit()
              throw "Imported application launch timed out."
            }

            $stdout = $stdoutTask.GetAwaiter().GetResult()
            $stderr = $stderrTask.GetAwaiter().GetResult()
            "Exit code: $($process.ExitCode)`nSTDOUT:`n$stdout`nSTDERR:`n$stderr" | Set-Content $log -Encoding utf8

            if ($process.ExitCode -ne 0) { throw "Imported EXE exited with code $($process.ExitCode)." }
            if (-not (Test-Path $shot)) { throw "Imported EXE did not create the screenshot." }
            if ((Get-Item $shot).Length -lt 25000) { throw "Screenshot is unexpectedly small." }
          }
          finally {
            if ($process) { $process.Dispose() }
          }

          Write-Host "Imported EXE launched and created a real screenshot."

      - name: Upload verified imported build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-Imported-Run-29557749076-Verification
          path: |
            verification/**
            build.log
          if-no-files-found: warn

      - name: Upload imported win-x64 program
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-Imported-Run-29557749076-win-x64
          path: publish/**
