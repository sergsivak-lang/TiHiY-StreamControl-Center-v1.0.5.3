name: Exact Transfer Run 29557749076

on:
  pull_request:
    types: [reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  transfer-exact-source-program:
    runs-on: ubuntu-latest
    env:
      SOURCE_SHA: 92cf943e0445a980b0322bdfaa0339faa21bdc2b
      DESTINATION_BRANCH: feature/stalker-theme-and-chat-fixes
    steps:
      - name: Checkout destination branch
        uses: actions/checkout@v4
        with:
          ref: feature/stalker-theme-and-chat-fixes
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "Destination before transfer: $(git rev-parse HEAD)"

      - name: Fetch exact source history
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags https://github.com/sergsivak-lang/TiHiY-StreamControl-Center.git \
            +refs/heads/feature/stalker-theme-and-chat-fixes:refs/remotes/source/stalker
          git cat-file -e "${SOURCE_SHA}^{commit}"
          echo "Source branch tip: $(git rev-parse refs/remotes/source/stalker)"
          echo "Exact source commit: $(git rev-parse ${SOURCE_SHA})"
          echo "Exact source tree: $(git rev-parse ${SOURCE_SHA}^{tree})"

      - name: Preserve destination workflows
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/destination-workflows
          mkdir -p /tmp/destination-workflows
          cp -a .github/workflows/. /tmp/destination-workflows/
          find /tmp/destination-workflows -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Replace program files from exact source commit
        shell: bash
        run: |
          set -euo pipefail
          git rm -r -f --ignore-unmatch .
          git clean -fdx
          git checkout "${SOURCE_SHA}" -- .

          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -a /tmp/destination-workflows/. .github/workflows/

          git add -A
          echo "Program files replaced from ${SOURCE_SHA}; destination workflows preserved."

      - name: Verify every non-workflow Git object
        shell: bash
        run: |
          set -euo pipefail

          git ls-tree -r "${SOURCE_SHA}" | awk -F '\t' '
            $2 !~ /^\.github\/workflows\// {
              split($1, a, " "); print a[1], a[3], $2
            }' | LC_ALL=C sort > /tmp/source-program.manifest

          git ls-files -s | awk -F '\t' '
            $2 !~ /^\.github\/workflows\// {
              split($1, a, " "); print a[1], a[2], $2
            }' | LC_ALL=C sort > /tmp/imported-program.manifest

          diff -u /tmp/source-program.manifest /tmp/imported-program.manifest

          SOURCE_COUNT=$(wc -l < /tmp/source-program.manifest)
          IMPORT_COUNT=$(wc -l < /tmp/imported-program.manifest)
          VERSION_VALUE=$(cat VERSION.txt)

          echo "Verified non-workflow objects: ${SOURCE_COUNT}"
          echo "Imported non-workflow objects: ${IMPORT_COUNT}"
          echo "VERSION=${VERSION_VALUE}"

          test "${SOURCE_COUNT}" = "${IMPORT_COUNT}"
          test "${VERSION_VALUE}" = "v1.0.5.3-UKRAINE-REFERENCE-THEME"
          test -f TiHiY.StreamControlCenter.sln
          test -f TiHiY.StreamControlCenter.csproj
          test -f MainWindow.xaml
          test -f Themes/UkraineReference.xaml
          test -f Themes/StalkerReference.xaml
          test -f Controls/RichChatTextBlock.cs

      - name: Commit verified program snapshot
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "Import verified program from run 29557749076 (92cf943)"
          echo "Imported commit: $(git rev-parse HEAD)"

      - name: Push destination branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:${DESTINATION_BRANCH}"
