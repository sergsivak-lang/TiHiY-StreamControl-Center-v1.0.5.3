name: Fix STALKER window behavior

on:
  push:
    branches:
      - agent/stalker-approved-exact-v4
    paths:
      - ".github/workflows/fix-stalker-window-behavior.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-window-behavior:
    runs-on: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/stalker-approved-exact-v4
          fetch-depth: 0
          persist-credentials: true

      - name: Remove polling timers and preserve maximize
        shell: pwsh
        run: |
          $layoutPath = "Services/StalkerApprovedLayoutRuntime.cs"
          $layout = Get-Content $layoutPath -Raw
          $layout = $layout.Replace("        private readonly DispatcherTimer _timer;`r`n", "")
          $layout = $layout.Replace(@'
            _timer = new DispatcherTimer(DispatcherPriority.Background, window.Dispatcher)
            {
                Interval = TimeSpan.FromMilliseconds(240)
            };
            _timer.Tick += TimerTick;
'@, "")
          $layout = $layout.Replace("            _timer.Start();`r`n", "")
          $layout = [regex]::Replace($layout, '(?ms)\r?\n        private void TimerTick\(object\? sender, EventArgs e\)\r?\n        \{.*?\r?\n        \}\r?\n', "`r`n")
          $layout = $layout.Replace("            _window.WindowState = WindowState.Normal;`r`n", "")
          $layout = $layout.Replace(@'
            _window.MaxWidth = Math.Max(DesignWidth, work.Width);
            _window.MaxHeight = Math.Max(DesignHeight, work.Height);
            _window.Width = DesignWidth;
            _window.Height = DesignHeight;
            _window.Left = work.Left + Math.Max(0, (work.Width - DesignWidth) / 2);
            _window.Top = work.Top + Math.Max(0, (work.Height - DesignHeight) / 2);
'@, @'
            _window.MaxWidth = double.PositiveInfinity;
            _window.MaxHeight = double.PositiveInfinity;
            if (_window.WindowState == WindowState.Normal)
            {
                if (double.IsNaN(_window.Width) || _window.Width < _window.MinWidth)
                    _window.Width = Math.Min(DesignWidth, work.Width);
                if (double.IsNaN(_window.Height) || _window.Height < _window.MinHeight)
                    _window.Height = Math.Min(DesignHeight, work.Height);
                if (double.IsNaN(_window.Left) || _window.Left < work.Left || _window.Left > work.Right - 100)
                    _window.Left = work.Left + Math.Max(0, (work.Width - _window.Width) / 2);
                if (double.IsNaN(_window.Top) || _window.Top < work.Top || _window.Top > work.Bottom - 100)
                    _window.Top = work.Top + Math.Max(0, (work.Height - _window.Height) / 2);
            }
'@)
          $layout = $layout.Replace("            _timer.Stop();`r`n            _timer.Tick -= TimerTick;`r`n", "")
          Set-Content $layoutPath $layout -Encoding utf8

          $texturePath = "Services/StalkerApprovedTextureRuntime.cs"
          $texture = Get-Content $texturePath -Raw
          $texture = $texture.Replace("        private readonly DispatcherTimer _timer;`r`n", "")
          $texture = $texture.Replace(@'
            _timer = new DispatcherTimer(DispatcherPriority.Background, window.Dispatcher)
            {
                Interval = TimeSpan.FromMilliseconds(220)
            };
            _timer.Tick += TimerTick;
'@, "")
          $texture = $texture.Replace("            _timer.Start();`r`n", "")
          $texture = [regex]::Replace($texture, '(?ms)\r?\n        private void TimerTick\(object\? sender, EventArgs e\)\r?\n        \{.*?\r?\n        \}\r?\n', "`r`n")
          $texture = $texture.Replace("            _timer.Stop();`r`n            _timer.Tick -= TimerTick;`r`n", "")
          Set-Content $texturePath $texture -Encoding utf8

          if ((Get-Content $layoutPath -Raw) -match 'DispatcherTimer _timer|TimerTick') { throw "Layout polling timer was not fully removed." }
          if ((Get-Content $texturePath -Raw) -match 'DispatcherTimer _timer|TimerTick') { throw "Texture polling timer was not fully removed." }
          if ((Get-Content $layoutPath -Raw) -match '_window.WindowState = WindowState.Normal;') { throw "Forced normal window state remains." }

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build and publish
        run: |
          dotnet restore TiHiY.StreamControlCenter.sln
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore
          dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish

      - name: Commit fix
        shell: pwsh
        run: |
          Remove-Item publish -Recurse -Force
          Remove-Item .github/workflows/fix-stalker-window-behavior.yml -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Виправити мерехтіння та підтримку розгортання STALKER-вікна"
          git push origin HEAD:agent/stalker-approved-exact-v4
